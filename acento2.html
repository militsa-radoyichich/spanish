<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>El Acento – 150 palabras</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #c8102e; background-image: radial-gradient(circle at 15% 20%, rgba(255,200,0,0.18) 0%, transparent 50%), radial-gradient(circle at 85% 75%, rgba(255,200,0,0.13) 0%, transparent 45%); min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
  .deck { width: 100%; max-width: 520px; }
  .header { text-align: center; margin-bottom: 1.2rem; }
  .header h1 { font-size: 22px; font-weight: 700; color: #fff; }
  .header p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 3px; }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 1rem; }
  .filter-btn { font-size: 11px; padding: 4px 12px; border-radius: 20px; border: none; background: rgba(255,255,255,0.2); color: #fff; cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { background: #fff; color: #c8102e; font-weight: 600; }
  .progress-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
  .progress { font-size: 13px; color: rgba(255,255,255,0.7); }
  .score { font-size: 13px; color: rgba(255,255,255,0.7); }
  .dots { display: flex; gap: 4px; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: background 0.2s; }
  .dot.seen { background: rgba(255,255,255,0.55); }
  .dot.active { background: #fff; }
  .card { background: #fff; border-radius: 16px; padding: 1.8rem 1.5rem; margin-bottom: 1.2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.2); min-height: 240px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.9rem; }
  .cat-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #bbb; }
  .word { font-size: 34px; font-weight: 700; color: #1a1a1a; text-align: center; }
  .rule-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .rule1 { background: #fef3c7; color: #92400e; }
  .rule2 { background: #dbeafe; color: #1e40af; }
  .rule3 { background: #dcfce7; color: #166534; }
  .syl-label { font-size: 12px; color: #aaa; }
  .syllables { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .syl-btn { font-size: 19px; font-weight: 600; padding: 7px 15px; border-radius: 10px; border: 2px solid #e0e0e0; background: #f9f9f9; color: #333; cursor: pointer; transition: all 0.15s; }
  .syl-btn:hover { border-color: #c8102e; background: #fff5f5; }
  .syl-btn.selected-correct { background: #dcfce7; border-color: #22c55e; color: #16a34a; }
  .syl-btn.selected-wrong { background: #fee2e2; border-color: #ef4444; color: #dc2626; }
  .syl-btn.reveal-correct { background: #dcfce7; border-color: #22c55e; color: #16a34a; }
  .feedback { font-size: 14px; font-weight: 500; min-height: 20px; text-align: center; }
  .feedback.correct { color: #16a34a; }
  .feedback.wrong { color: #dc2626; }
  .sound-btn { background: #c8102e; color: #fff; border: none; border-radius: 10px; padding: 8px 18px; font-size: 13px; cursor: pointer; }
  .sound-btn:hover { background: #a50d26; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 0.3rem; }
  .nav-btn { font-size: 13px; padding: 8px 20px; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: #fff; cursor: pointer; }
  .nav-btn:hover { background: rgba(255,255,255,0.3); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .shuffle-btn { font-size: 12px; color: rgba(255,255,255,0.6); background: transparent; border: none; text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>
<div class="deck">
  <div class="header">
    <h1>🇪🇸 El Acento</h1>
    <p>Klikni na slog gdje pada naglasak · 150 palabras</p>
  </div>
  <div class="filters" id="filters"></div>
  <div class="progress-wrap">
    <div class="progress" id="progress"></div>
    <div class="score" id="scoreDisplay"></div>
  </div>
  <div class="dots" id="dots"></div>
  <div class="card" id="card">
    <div class="cat-tag" id="catTag"></div>
    <div class="word" id="word"></div>
    <span class="rule-badge" id="ruleBadge"></span>
    <div><div class="syl-label" style="text-align:center;margin-bottom:6px;">¿Cuál sílaba se acentúa?</div>
    <div class="syllables" id="syllables"></div></div>
    <div class="feedback" id="feedback"></div>
    <button class="sound-btn" onclick="speak()">🔊 Escuchar</button>
  </div>
  <div class="controls">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← Anterior</button>
    <button class="shuffle-btn" onclick="shuffleCards()">barajar</button>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Siguiente →</button>
  </div>
</div>

const ruleClass={1:"rule1",2:"rule2",3:"rule3"};
const catLabels={escuela:"🏫 Escuela",comida:"🍽️ Comida","profesión":"💼 Profesión","nacio.":"🌍 Nacio.",ropa:"👕 Ropa",cuerpo:"🫀 Cuerpo",casa:"🏠 Casa",naturaleza:"🌿 Naturaleza",transporte:"🚌 Transporte",clima:"🌦️ Clima",familia:"👨‍👩‍👧 Familia"};

let activeCat="todas";
let data=all.slice();
let order=[...Array(data.length).keys()];
let cur=0,seen=new Set(),answered=false,correct=0,total=0;

function getFiltered(){return activeCat==="todas"?all:all.filter(c=>c.cat===activeCat);}

function renderFilters(){
  document.getElementById('filters').innerHTML=cats.map(c=>`
    <button class="filter-btn${c===activeCat?' active':''}" onclick="setFilter('${c}')">${c==="todas"?"✦ todas":catLabels[c]||c}</button>`).join('');
}

function setFilter(cat){
  activeCat=cat; data=getFiltered();
  order=[...Array(data.length).keys()];
  cur=0;seen=new Set();answered=false;correct=0;total=0;
  renderFilters(); render();
}

function shuffleCards(){
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  cur=0;seen=new Set();answered=false;correct=0;total=0; render();
}

function render(){
  seen.add(cur);answered=false;
  const c=data[order[cur]];
  document.getElementById('progress').textContent=`${cur+1} / ${data.length}`;
  document.getElementById('scoreDisplay').textContent=total>0?`✓ ${correct}/${total}`:'';
  document.getElementById('catTag').textContent=catLabels[c.cat]||c.cat;
  document.getElementById('word').textContent=c.word;
  const badge=document.getElementById('ruleBadge');
  badge.textContent=ruleLabels[c.rule]; badge.className='rule-badge '+ruleClass[c.rule];
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('syllables').innerHTML=c.syls.map((s,i)=>`
    <button class="syl-btn" onclick="checkAnswer(${i})">${s}</button>`).join('');
  const dots=document.getElementById('dots');
  dots.innerHTML=order.map((_,i)=>`<div class="dot${i===cur?' active':seen.has(i)?' seen':''}"></div>`).join('');
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').disabled=cur===data.length-1;
}

function checkAnswer(idx){
  if(answered)return; answered=true; total++;
  const c=data[order[cur]];
  const btns=document.querySelectorAll('.syl-btn');
  const fb=document.getElementById('feedback');
  if(idx===c.stress){correct++;btns[idx].classList.add('selected-correct');fb.textContent='✓ ¡Correcto!';fb.className='feedback correct';}
  else{btns[idx].classList.add('selected-wrong');btns[c.stress].classList.add('reveal-correct');fb.textContent=`✗ El acento cae en "${c.syls[c.stress]}"`;fb.className='feedback wrong';}
  document.getElementById('scoreDisplay').textContent=`✓ ${correct}/${total}`;
}

function speak(){
  const c=data[order[cur]];
  const u=new SpeechSynthesisUtterance(c.word);
  u.lang='es-US'; u.rate=0.85;
  const v=speechSynthesis.getVoices().find(x=>x.name==='Google español de Estados Unidos')||speechSynthesis.getVoices().find(x=>x.lang==='es-US')||speechSynthesis.getVoices().find(x=>x.lang.startsWith('es'));
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}

function navigate(dir){
  cur=Math.max(0,Math.min(data.length-1,cur+dir));
  answered=false; render();
}

speechSynthesis.onvoiceschanged=()=>{};
renderFilters(); render();
</script>
</body>
</html>
